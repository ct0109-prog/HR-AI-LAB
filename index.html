<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Future Lab</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg-deep-1:#322f7a;
      --bg-deep-2:#3c3991;
      --bg-deep-3:#2d2c73;
      --green:#33ff42;
      --white:#f7f7f4;
      --tag-bg:#f3f4ef;
      --tag-text:#62871a;
      --btn-bg:#f5f6f0;
      --btn-text:#5f8619;
      --mint:#91d9d6;
      --mint2:#c9ddb2;
    }

    body{
      margin:0;
      font-family: Arial, Helvetica, "Segoe UI", sans-serif;
      color:#fff;
      background:
        linear-gradient(180deg, #3a3789 0%, #34317f 50%, #98d8d7 50%, #c8dcb0 100%);
    }

    .hero{
      position:relative;
      overflow:hidden;
      min-height:500px;
      padding:34px 24px 120px;
      background:
        radial-gradient(ellipse at 18% 18%, rgba(79, 219, 211, 0.18) 0%, rgba(79,219,211,0.04) 20%, transparent 42%),
        radial-gradient(ellipse at 78% 20%, rgba(114, 227, 218, 0.12) 0%, rgba(114,227,218,0.03) 18%, transparent 34%),
        radial-gradient(ellipse at 50% 32%, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.015) 18%, transparent 38%),
        linear-gradient(135deg, var(--bg-deep-1) 0%, var(--bg-deep-2) 48%, var(--bg-deep-3) 100%);
    }

    /* 微妙垂直膜層 */
    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg,
          rgba(255,255,255,.05) 0%,
          rgba(255,255,255,.01) 4%,
          transparent 8%,
          rgba(255,255,255,.03) 13%,
          transparent 19%,
          rgba(255,255,255,.025) 27%,
          transparent 35%,
          rgba(255,255,255,.035) 43%,
          transparent 51%,
          rgba(255,255,255,.03) 60%,
          transparent 68%,
          rgba(255,255,255,.02) 77%,
          transparent 86%,
          rgba(255,255,255,.03) 94%,
          transparent 100%);
      opacity:.65;
      pointer-events:none;
      mix-blend-mode:screen;
    }

    /* 貓眼式柔光 */
    .hero::after{
      content:"";
      position:absolute;
      inset:-10% -5% auto -5%;
      height:220px;
      background:
        radial-gradient(ellipse at 22% 50%, rgba(255,255,255,.16) 0%, rgba(255,255,255,.06) 18%, transparent 44%),
        radial-gradient(ellipse at 55% 46%, rgba(125,255,232,.10) 0%, rgba(125,255,232,.03) 16%, transparent 40%),
        radial-gradient(ellipse at 83% 42%, rgba(255,255,255,.10) 0%, rgba(255,255,255,.03) 20%, transparent 44%);
      filter: blur(8px);
      pointer-events:none;
    }

    .hero-grid{
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size:48px 48px;
      opacity:.14;
      pointer-events:none;
    }

    .orb{
      position:absolute;
      border-radius:50%;
      background:rgba(0, 185, 176, .88);
      box-shadow:0 0 22px rgba(45,255,229,.12);
      opacity:.95;
    }
    .orb.gray{
      background:#b3b3b3;
      box-shadow:none;
    }

    .o1{ width:38px; height:38px; left:18px; top:16px;}
    .o2{ width:28px; height:28px; left:290px; top:14px;}
    .o3{ width:46px; height:46px; left:940px; top:18px;}
    .o4{ width:30px; height:30px; left:1430px; top:18px;}
    .o5{ width:40px; height:40px; right:64px; top:-4px;}
    .o6{ width:30px; height:30px; left:860px; top:26px;}
    .o7{ width:44px; height:44px; left:1110px; top:18px;}
    .o8{ width:42px; height:42px; left:1290px; top:20px;}
    .o9{ width:34px; height:34px; left:1460px; top:28px; opacity:.45;}
    .o10{ width:34px; height:34px; left:310px; top:44px; opacity:.75;}
    .o11{ width:34px; height:34px; left:710px; top:44px; opacity:.72;}
    .o12{ width:34px; height:34px; left:1455px; top:46px; opacity:.45;}

    .hero-content{
      position:relative;
      z-index:2;
      max-width:1480px;
      margin:0 auto;
      padding-top:8px;
    }

    .title-row{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin-bottom:42px;
    }

    .title{
      margin:0;
      font-size:clamp(42px, 5.6vw, 72px);
      line-height:.95;
      letter-spacing:-1.5px;
      font-weight:800;
      color:var(--white);
      text-shadow:0 1px 0 rgba(255,255,255,.04);
    }

    .title .green{ color:var(--green); }

    .tiny-link{
      color:rgba(255,255,255,.85);
      text-decoration:none;
      font-size:20px;
      margin-top:14px;
      opacity:.9;
    }

    .subtitle-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:24px;
      flex-wrap:wrap;
    }

    .subtitle{
      margin:0;
      max-width:1100px;
      font-size:clamp(24px, 2.9vw, 40px);
      line-height:1.18;
      font-weight:780;
      color:var(--white);
      letter-spacing:-.4px;
      text-wrap:balance;
      text-shadow:0 1px 0 rgba(255,255,255,.04);
    }

    .subtitle .green{ color:var(--green); }

    .hero-note{
      padding-top:16px;
      font-size:15px;
      font-weight:700;
      color:rgba(255,255,255,.82);
      white-space:nowrap;
    }

    .cards-section{
      position:relative;
      padding:54px 10px 18px;
      background:
        linear-gradient(90deg, var(--mint) 0%, var(--mint2) 100%);
    }

    .cards{
      max-width:1460px;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(3, minmax(280px, 1fr));
      gap:72px;
    }

    .card{
      min-height:320px;
      border-radius:4px;
      overflow:hidden;
      transition:transform .18s ease, filter .18s ease;
    }

    .card:hover{
      transform:translateY(-4px);
      filter:brightness(1.02);
    }

    .card-inner{
      position:relative;
      min-height:320px;
      padding:38px 42px 34px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      overflow:hidden;
      isolation:isolate;
      background-color:#6a7380;
    }

    .card-inner::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px);
      background-size:36px 36px;
      opacity:.28;
      z-index:0;
    }

    .card-inner::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.06));
      z-index:0;
    }

    .governance{
      background:
        radial-gradient(circle at 50% 55%, rgba(148,255,244,.34) 0 10px, transparent 11px),
        radial-gradient(circle at 32% 55%, rgba(148,255,244,.78) 0 8px, transparent 9px),
        radial-gradient(circle at 68% 55%, rgba(148,255,244,.78) 0 8px, transparent 9px),
        radial-gradient(circle at 50% 30%, rgba(148,255,244,.78) 0 8px, transparent 9px),
        radial-gradient(circle at 50% 80%, rgba(148,255,244,.78) 0 8px, transparent 9px),
        radial-gradient(circle at 14% 18%, rgba(148,255,244,.70) 0 7px, transparent 8px),
        radial-gradient(circle at 86% 18%, rgba(148,255,244,.70) 0 7px, transparent 8px),
        radial-gradient(circle at 84% 72%, rgba(148,255,244,.70) 0 7px, transparent 8px),
        repeating-radial-gradient(circle at 50% 55%, rgba(148,255,244,.20) 0 2px, transparent 2px 28px),
        linear-gradient(135deg, #6d7781 0%, #67717a 100%);
    }

    .intelligence{
      background:
        radial-gradient(ellipse at 50% 50%, rgba(103,170,255,.20) 0%, rgba(103,170,255,.07) 18%, transparent 42%),
        linear-gradient(90deg, transparent 8%, rgba(107,177,255,.08) 20%, rgba(107,177,255,.22) 50%, rgba(107,177,255,.08) 80%, transparent 92%),
        radial-gradient(circle at 24% 60%, rgba(107,177,255,.88) 0 8px, transparent 9px),
        radial-gradient(circle at 36% 60%, rgba(107,177,255,.88) 0 8px, transparent 9px),
        radial-gradient(circle at 50% 60%, rgba(107,177,255,.95) 0 11px, transparent 12px),
        radial-gradient(circle at 64% 60%, rgba(107,177,255,.88) 0 8px, transparent 9px),
        radial-gradient(circle at 76% 60%, rgba(107,177,255,.88) 0 8px, transparent 9px),
        radial-gradient(circle at 82% 24%, rgba(107,177,255,.88) 0 9px, transparent 10px),
        linear-gradient(135deg, #6d7887 0%, #677383 100%);
    }

    .policy{
      background:
        radial-gradient(ellipse at 50% 48%, rgba(255,223,121,.18) 0%, rgba(255,223,121,.05) 20%, transparent 42%),
        radial-gradient(circle at 50% 55%, rgba(255,223,121,.40) 0 9px, transparent 10px),
        radial-gradient(circle at 34% 36%, rgba(255,223,121,.86) 0 8px, transparent 9px),
        radial-gradient(circle at 66% 36%, rgba(255,223,121,.86) 0 8px, transparent 9px),
        radial-gradient(circle at 18% 58%, rgba(255,223,121,.84) 0 8px, transparent 9px),
        radial-gradient(circle at 82% 58%, rgba(255,223,121,.84) 0 8px, transparent 9px),
        radial-gradient(circle at 28% 80%, rgba(145,255,244,.78) 0 7px, transparent 8px),
        radial-gradient(circle at 72% 80%, rgba(145,255,244,.78) 0 7px, transparent 8px),
        repeating-radial-gradient(circle at 50% 55%, rgba(255,223,121,.17) 0 2px, transparent 2px 26px),
        linear-gradient(135deg, #8a8274 0%, #7e776a 100%);
    }

    .card-layer{
      position:relative;
      z-index:1;
    }

    .tag{
      display:inline-block;
      background:var(--tag-bg);
      color:var(--tag-text);
      padding:10px 16px;
      font-size:18px;
      line-height:1;
      font-weight:800;
      letter-spacing:-.2px;
      border-radius:1px;
      box-shadow:0 3px 12px rgba(0,0,0,.06);
    }

    .btn{
      display:inline-block;
      background:var(--btn-bg);
      color:var(--btn-text);
      text-decoration:none;
      padding:11px 17px;
      font-size:18px;
      line-height:1;
      font-weight:800;
      border-radius:8px;
      box-shadow:0 8px 18px rgba(0,0,0,.12);
    }

    .btn:hover{ filter:brightness(.98); }

    @media (max-width:1200px){
      .cards{
        gap:28px;
      }
      .card-inner{
        min-height:290px;
      }
    }

    @media (max-width:1024px){
      .cards{
        grid-template-columns:1fr;
      }
      .hero{
        min-height:auto;
        padding-bottom:90px;
      }
      .subtitle{
        max-width:100%;
      }
    }

    @media (max-width:680px){
      .hero{
        padding:24px 18px 76px;
      }
      .cards-section{
        padding:30px 14px 20px;
      }
      .card-inner{
        padding:28px 26px;
      }
      .tag{
        font-size:16px;
      }
      .btn{
        font-size:16px;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-grid"></div>

    <span class="orb o1"></span>
    <span class="orb gray o2"></span>
    <span class="orb o3"></span>
    <span class="orb o4"></span>
    <span class="orb o5"></span>
    <span class="orb o6"></span>
    <span class="orb gray o7"></span>
    <span class="orb gray o8"></span>
    <span class="orb o9"></span>
    <span class="orb gray o10"></span>
    <span class="orb o11"></span>
    <span class="orb o12"></span>

    <div class="hero-content">
      <div class="title-row">
        <h1 class="title">HR <span class="green">Future</span> Lab</h1>
        <a class="tiny-link" href="index.html">🔗</a>
      </div>

      <div class="subtitle-row">
        <p class="subtitle">Exploring the Future of <span class="green">AI-Augmented</span> HR Governance</p>
        <div class="hero-note">2026/3 HRIS Team</div>
      </div>
    </div>
  </section>

  <section class="cards-section">
    <div class="cards">

      <article class="card">
        <div class="card-inner governance">
          <div class="card-layer">
            <div class="tag">HR AI GOVERNANCE FRAMEWORK</div>
          </div>
          <div class="card-layer">
            <a class="btn" href="hr-ai-governance-opening-v2%20(2).html" target="_blank">Explore Framework</a>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card-inner intelligence">
          <div class="card-layer">
            <div class="tag">HR INTELLIGENCE ENGINE</div>
          </div>
          <div class="card-layer">
            <a class="btn" href="hr-intelligence.html" target="_blank">View Intelligence Deck</a>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card-inner policy">
          <div class="card-layer">
            <div class="tag">POLICY MIND</div>
          </div>
          <div class="card-layer">
            <a class="btn" href="policymind-v11.html" target="_blank">Explore Policy Mind</a>
          </div>
        </div>
      </article>

    </div>
  </section>

</body>
</html>
